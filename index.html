        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(100, 100, 250);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.8;
            controls.enableDamping = true;

            const geometry = new THREE.BufferGeometry();
            const pts = [];
            for (let i = 0; i < positions.length; i += 3) {
                pts.push(new THREE.Vector3(positions[i], positions[i+1], positions[i+2]));
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            // --- 点の描画 (AdditiveBlendingで発光) ---
            const pointMat = new THREE.PointsMaterial({ 
                size: 2.2, 
                vertexColors: true, 
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.9
            });
            const points = new THREE.Points(geometry, pointMat);
            scene.add(points);

            // --- 線の描画 (昨日と同じ接続ロジック) ---
            const linePositions = [];
            const lineColors = [];
            const threshold = 18.0; // 接続する距離のしきい値

            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dist = pts[i].distanceTo(pts[j]);
                    if (dist < threshold) {
                        linePositions.push(pts[i].x, pts[i].y, pts[i].z);
                        linePositions.push(pts[j].x, pts[j].y, pts[j].z);
                        // 色も点と同じ色を継承
                        lineColors.push(colors[i*3], colors[i*3+1], colors[i*3+2]);
                        lineColors.push(colors[j*3], colors[j*3+1], colors[j*3+2]);
                    }
                }
            }

            const lineGeo = new THREE.BufferGeometry();
            lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
            lineGeo.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));
            
            const lineMat = new THREE.LineBasicMaterial({ 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.3, 
                blending: THREE.AdditiveBlending 
            });
            const lines = new THREE.LineSegments(lineGeo, lineMat);
            scene.add(lines);

            // 重心を中心に設定
            geometry.computeBoundingSphere();
            controls.target.copy(geometry.boundingSphere.center);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
