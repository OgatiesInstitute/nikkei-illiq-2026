<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikkei 225 // GOLD (Flow) — A TAD REDDY (Friction) // 08 APR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Times New Roman', serif; }
        #title {
            position: absolute; top: 40px; left: 40px; color: #FFFFFF;
            z-index: 10; pointer-events: none; letter-spacing: 0.3em; line-height: 1.8;
        }
    </style>
</head>
<body>
    <div id="title">
        <div style="font-size: 15px; font-style: italic; opacity: 0.9;">Nikkei 225</div>
        <div style="font-size: 13px; opacity: 0.7;">GOLD (Flow) — A TAD REDDY (Friction)</div>
        <div style="font-size: 11px; opacity: 0.5;">08 // APRIL // 2026</div>
    </div>

    <script>
        let scene, camera, renderer, controls, points, lines;

        // キラメキを最大化する「潤んだ光」のテクスチャ生成
        function createRadiantTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255,255,255,1.0)');   // 核：純白
            gradient.addColorStop(0.15, 'rgba(255,255,255,0.8)'); // 芯の輝き
            gradient.addColorStop(0.4, 'rgba(255,255,255,0.2)');  // 後光
            gradient.addColorStop(1, 'rgba(255,255,255,0)');     // 融和
            context.fillStyle = gradient;
            context.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 26);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.2; // 優雅な回転

            createStructure();
            animate();
        }

        function createStructure() {
            if (points) scene.remove(points);
            if (lines) scene.remove(lines);

            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const pts = [];
            const numPoints = 1200; // 圧倒的な粒子密度

            const colorDeepCrimson = new THREE.Color(0xff2200); // 鮮やかな深い紅
            const colorBrightGold = new THREE.Color(0xffd700);  // 輝く黄金

            for (let i = 0; i < numPoints; i++) {
                // PCA構造を模した有機的な楕円体
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const r = 9 + Math.random() * 3;
                
                const x = r * Math.sin(phi) * Math.cos(theta) * 1.5;
                const y = r * Math.cos(phi) * 0.7;
                const z = r * Math.sin(phi) * Math.sin(theta);

                positions.push(x, y, z);
                pts.push(new THREE.Vector3(x, y, z));

                // 距離による「滑らかな」Lerp（線形補間）計算
                const t = Math.pow(r / 12, 1.5); // 補間のカーブを急に
                let c = new THREE.Color();
                c.copy(colorDeepCrimson).lerp(colorBrightGold, t);
                colors.push(c.r, c.g, c.b);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            // キラメキ（発光）を最大化するマテリアル設定
            const pointMaterial = new THREE.PointsMaterial({
                size: 0.65,                    // 芯を大きく
                map: createRadiantTexture(), // テクスチャを滑らかに
                vertexColors: true,
                transparent: true,
                opacity: 0.9,                  // 不透明度を上げて発光を強める
                blending: THREE.AdditiveBlending, // 加算合成で白熱させる
                depthWrite: false
            });

            points = new THREE.Points(geometry, pointMaterial);
            scene.add(points);

            // 繊細な「金の糸（骨格）」の復活
            const linePositions = [];
            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dist = pts[i].distanceTo(pts[j]);
                    // 以前より閾値を広げ、かつ乱数でランダム性を
                    if (dist < 4.8 && Math.random() > 0.9) {
                        linePositions.push(pts[i].x, pts[i].y, pts[i].z, pts[j].x, pts[j].y, pts[j].z);
                    }
                }
            }

            const lineGeometry = new THREE.BufferGeometry();
            lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));

            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0xD4AF37, // 黄金色
                transparent: true,
                opacity: 0.08,   // 極限まで細く、淡く（主張しすぎないように）
                blending: THREE.AdditiveBlending
            });
            
            lines = new THREE.LineSegments(lineGeometry, lineMaterial);
            scene.add(lines);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
