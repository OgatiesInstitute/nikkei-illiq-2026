<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE IRON SKELETON // 08 APR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Times New Roman', serif; }
        #title {
            position: absolute; top: 40px; left: 40px; color: #FFFFFF;
            z-index: 10; pointer-events: none; letter-spacing: 0.3em; line-height: 2.0;
        }
    </style>
</head>
<body>
    <div id="title">
        <div style="font-size: 15px; font-style: italic; opacity: 0.9;">THE IRON SKELETON</div>
        <div style="font-size: 11px; opacity: 0.7;">NIKKEI 225 TOPOLOGY // ILLIQ - color gradient</div>
        <div style="font-size: 11px; opacity: 0.5;">08 // APRIL // 2026</div>
    </div>

    <script>
        let scene, camera, renderer, controls;

        // 【ブルガリ級の輝き】芯の白を極限まで硬くしたテクスチャ
        function createJewelTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255,255,255,1.0)');   // 核心
            gradient.addColorStop(0.2, 'rgba(255,255,255,1.0)'); // 白熱エリアを昨日以上に拡大
            gradient.addColorStop(0.3, 'rgba(255,255,255,0.9)'); // 強い光の輪
            gradient.addColorStop(0.6, 'rgba(255,255,255,0.2)'); // 繊細なぼかし
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 24);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.2;

            createStructure();
            animate();
        }

        function createStructure() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const pts = [];
            const numPoints = 1600;

            const colorDeepRed = new THREE.Color(0xff0000); // 混じりけのない赤
            const colorPureGold = new THREE.Color(0xffd700); // 混じりけのない金

            for (let i = 0; i < numPoints; i++) {
                const r = 8 + Math.random() * 5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const x = r * Math.sin(phi) * Math.cos(theta) * 1.6;
                const y = r * Math.cos(phi) * 0.75;
                const z = r * Math.sin(phi) * Math.sin(theta);

                positions.push(x, y, z);
                pts.push(new THREE.Vector3(x, y, z));

                const t = Math.pow(r / 13, 1.1);
                let c = new THREE.Color();
                c.copy(colorDeepRed).lerp(colorPureGold, t);
                colors.push(c.r, c.g, c.b);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const pointMaterial = new THREE.PointsMaterial({
                size: 1.4, // 昨日のドットの「存在感」を取り戻すためのサイズ
                map: createJewelTexture(),
                vertexColors: true,
                transparent: true,
                opacity: 1.0,
                blending: THREE.AdditiveBlending,
                depthTest: false, // 奥の光を隠さず、すべてを重畳させて発光させる
                depthWrite: false
            });

            scene.add(new THREE.Points(geometry, pointMaterial));

            // 金の糸（極細）
            const linePositions = [];
            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    if (pts[i].distanceTo(pts[j]) < 4.0 && Math.random() > 0.94) {
                        linePositions.push(pts[i].x, pts[i].y, pts[i].z, pts[j].x, pts[j].y, pts[j].z);
                    }
                }
            }
            const lineGeometry = new THREE.BufferGeometry();
            lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
            scene.add(new THREE.LineSegments(lineGeometry, new THREE.LineBasicMaterial({
                color: 0xffaa00, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending
            })));
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
