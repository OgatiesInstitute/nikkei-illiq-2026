<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE IRON SKELETON // jewel // 08 APR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Times New Roman', serif; }
        #title {
            position: absolute; top: 30px; left: 30px; color: #FFFFFF;
            z-index: 10; pointer-events: none; letter-spacing: 0.2em; line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="title">
        <div style="font-size: 15px; font-style: italic; opacity: 0.9;">THE IRON SKELETON</div>
        <div style="font-size: 13px; opacity: 0.7;">NIKKEI 225 TOPOLOGY // jewel</div>
        <div style="font-size: 11px; opacity: 0.5;">08 // APRIL // 2026</div>
    </div>

    <script>
        let scene, camera, renderer, controls;

        // 滑らかな円形の光（スプライト）を生成する関数
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.3;

            createStructure();
            animate();
        }

        function createStructure() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const numPoints = 600; // 密度を大幅にアップ

            const colorDeepRed = new THREE.Color(0x990000); // 深い紅
            const colorBrightOrange = new THREE.Color(0xff6600); // 鮮やかなオレンジ
            const colorGold = new THREE.Color(0xffd700); // 黄金

            for (let i = 0; i < numPoints; i++) {
                // 有機的な楕円構造
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const r = 8 + Math.random() * 4;
                
                const x = r * Math.sin(phi) * Math.cos(theta) * (1 + Math.random() * 0.2);
                const y = r * Math.cos(phi) * 0.6;
                const z = r * Math.sin(phi) * Math.sin(theta);

                positions.push(x, y, z);

                // グラデーション計算（シームレスな混色）
                const dist = new THREE.Vector3(x, y, z).length();
                const t = (dist - 5) / 10; 
                let c = new THREE.Color();
                if (t < 0.5) {
                    c.copy(colorDeepRed).lerp(colorBrightOrange, t * 2);
                } else {
                    c.copy(colorBrightOrange).lerp(colorGold, (t - 0.5) * 2);
                }
                colors.push(c.r, c.g, c.b);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const pointMaterial = new THREE.PointsMaterial({
                size: 0.6,
                map: createCircleTexture(), // 滑らかなテクスチャを適用
                vertexColors: true,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const points = new THREE.Points(geometry, pointMaterial);
            scene.add(points);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
