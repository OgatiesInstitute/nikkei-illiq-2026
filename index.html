<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE IRON SKELETON // jewel // 08 APR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Times New Roman', serif; }
        canvas { display: block; }
        
        #title {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #FFFFFF;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 0.2em;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="title">
        <div style="font-size: 16px; font-style: italic; opacity: 0.9;">THE IRON SKELETON</div>
        <div style="font-size: 14px; opacity: 0.7;">NIKKEI 225 TOPOLOGY // jewel</div>
        <div style="font-size: 12px; opacity: 0.5;">56,078.83 // 08 APRIL 2026</div>
    </div>

    <script>
        let scene, camera, renderer, controls, points, lines;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true; 
            controls.autoRotateSpeed = 0.5; // より優雅な回転速度へ

            createStructure();
            animate();
        }

        function createStructure() {
            if (points) scene.remove(points);
            if (lines) scene.remove(lines);

            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const pts = [];
            
            const numPoints = 169; // 観測銘柄数に合わせた密度感

            for (let i = 0; i < numPoints; i++) {
                // PCAの結果を模した楕円体構造
                const x = (Math.random() - 0.5) * 15;
                const y = (Math.random() - 0.5) * 8;
                const z = (Math.random() - 0.5) * 15;
                
                positions.push(x, y, z);
                pts.push(new THREE.Vector3(x, y, z));

                // Jewel色彩ロジック：黄金から微かな紅へ
                const rand = Math.random();
                if (rand > 0.85) {
                    colors.push(1.0, 1.0, 1.0); // ダイヤモンド
                } else if (rand > 0.6) {
                    colors.push(0.9, 0.2, 0.3); // 微かな紅（ルビー）
                } else {
                    colors.push(0.83, 0.68, 0.21); // 黄金
                }
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const pointMaterial = new THREE.PointsMaterial({ 
                size: 0.25, 
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending 
            });

            points = new THREE.Points(geometry, pointMaterial);
            scene.add(points);

            // 繊細な「金の糸」
            const linePositions = [];
            const threshold = 5.0; 

            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dist = pts[i].distanceTo(pts[j]);
                    if (dist < threshold && Math.random() > 0.8) {
                        linePositions.push(pts[i].x, pts[i].y, pts[i].z);
                        linePositions.push(pts[j].x, pts[j].y, pts[j].z);
                    }
                }
            }

            const lineGeometry = new THREE.BufferGeometry();
            lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));

            const lineMaterial = new THREE.LineBasicMaterial({ 
                color: 0xD4AF37, 
                transparent: true, 
                opacity: 0.15, // 極細の糸のような質感
                blending: THREE.AdditiveBlending 
            });
            
            lines = new THREE.LineSegments(lineGeometry, lineMaterial);
            scene.add(lines);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
