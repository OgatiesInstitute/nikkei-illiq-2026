<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKEI 225 TOPOLOGY // 08 APR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Times New Roman', serif; }
        #title {
            position: absolute; top: 40px; left: 40px; color: #FFFFFF;
            z-index: 10; pointer-events: none; letter-spacing: 0.25em; line-height: 2.0;
        }
    </style>
</head>
<body>
    <div id="title">
        <div style="font-size: 13px; opacity: 0.8; letter-spacing: 0.15em;">
            NIKKEI 225 TOPOLOGY // THE GEOMETRY OF LOSS
        </div>
        <div style="font-size: 10px; opacity: 0.5; letter-spacing: 0.05em; margin-top: 4px;">
            ILLIQ SPECTRUM: GOLD (FLOW) — A TAD REDDY (FRICTION)
        </div>
        <div style="font-size: 10px; opacity: 0.3; margin-top: 8px;">
            08 // APRIL // 2026
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls;

        // 【極光】中心の白熱エリアを最大化し、発色を鋭くするテクスチャ
        function createJewelTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255,255,255,1.0)');   // 核心
            gradient.addColorStop(0.2, 'rgba(255,255,255,1.0)'); // 昨日の熱量を超える白の核
            gradient.addColorStop(0.3, 'rgba(255,255,255,0.9)'); // 強い光の輪
            gradient.addColorStop(0.6, 'rgba(255,255,255,0.2)'); // 空間への融和
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 24);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.2; // 宝石の重みを感じさせる回転速度

            createStructure();
            animate();
        }

        function createStructure() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const pts = [];
            const numPoints = 1600; // 圧倒的な粒子数

            // Sasha流の色彩設計: 黄金から「a tad reddy」へ
            const colorGold = new THREE.Color(0xffd700);    // PURE GOLD
            const colorTadReddy = new THREE.Color(0xff4400); // A TAD REDDY (FRICTION)

            for (let i = 0; i < numPoints; i++) {
                // 有機的なPCA構造を模した分布
                const r = 8 + Math.random() * 5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                
                const x = r * Math.sin(phi) * Math.cos(theta) * 1.6;
                const y = r * Math.cos(phi) * 0.75;
                const z = r * Math.sin(phi) * Math.sin(theta);

                positions.push(x, y, z);
                pts.push(new THREE.Vector3(x, y, z));

                // ILLIQロジックに基づく色彩補間（illiqFactorはColabで計算し適用）
                const illiqFactor = Math.pow(r / 13, 1.1); // 仮の分布。実際はILLIQ値を適用。
                let c = new THREE.Color();
                c.copy(colorGold).lerp(colorTadReddy, illiqFactor);
                colors.push(c.r, c.g, c.b);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const pointMaterial = new THREE.PointsMaterial({
                size: 1.4, // 昨日のPlotlyに勝つためのドットサイズ
                map: createJewelTexture(),
                vertexColors: true,
                transparent: true,
                opacity: 1.0,
                blending: THREE.AdditiveBlending, // 加算合成
                depthTest: false, // 重なりによる白熱化を促進
                depthWrite: false
            });

            scene.add(new THREE.Points(geometry, pointMaterial));

            // 金の糸 (Golden Skeleton)
            const linePositions = [];
            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dist = pts[i].distanceTo(pts[j]);
                    if (dist < 4.0 && Math.random() > 0.94) {
                        linePositions.push(pts[i].x, pts[i].y, pts[i].z, pts[j].x, pts[j].y, pts[j].z);
                    }
                }
            }
            const lineGeometry = new THREE.BufferGeometry();
            lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0xffaa00,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending
            });
            scene.add(new THREE.LineSegments(lineGeometry, lineMaterial));
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
