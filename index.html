<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE IRON SKELETON // jewel // 08 APR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Times New Roman', serif; }
        #title {
            position: absolute; top: 30px; left: 30px; color: #FFFFFF;
            z-index: 10; pointer-events: none; letter-spacing: 0.2em; line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="title">
        <div style="font-size: 15px; font-style: italic; opacity: 0.9;">THE IRON SKELETON</div>
        <div style="font-size: 13px; opacity: 0.7;">NIKKEI 225 TOPOLOGY // jewel</div>
        <div style="font-size: 11px; opacity: 0.5;">08 // APRIL // 2026</div>
    </div>

    <script>
        let scene, camera, renderer, controls, points, lines;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4; // より重厚な回転へ

            createStructure();
            animate();
        }

        function createStructure() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const pts = [];
            const numPoints = 200;

            // 色のグラデーション関数（赤から黄金へのシームレスな移行）
            const colorA = new THREE.Color(0xff2200); // 深い紅
            const colorB = new THREE.Color(0xffd700); // 黄金
            const colorC = new THREE.Color(0xffffff); // 純白

            for (let i = 0; i < numPoints; i++) {
                const x = (Math.random() - 0.5) * 16;
                const y = (Math.random() - 0.5) * 10;
                const z = (Math.random() - 0.5) * 16;
                positions.push(x, y, z);
                pts.push(new THREE.Vector3(x, y, z));

                const t = Math.random();
                let finalColor = new THREE.Color();
                if (t < 0.7) {
                    finalColor.copy(colorA).lerp(colorB, t / 0.7); // 赤〜オレンジ〜黄金の滑らかな混色
                } else {
                    finalColor.copy(colorB).lerp(colorC, (t - 0.7) / 0.3); // 黄金〜白への輝き
                }
                colors.push(finalColor.r, finalColor.g, finalColor.b);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            // キラメキを最大化するマテリアル設定
            const pointMaterial = new THREE.PointsMaterial({
                size: 0.4,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending, // 重なった箇所が白熱する
                depthWrite: false
            });

            points = new THREE.Points(geometry, pointMaterial);
            scene.add(points);

            // 金糸の構造
            const linePositions = [];
            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dist = pts[i].distanceTo(pts[j]);
                    if (dist < 4.5 && Math.random() > 0.85) {
                        linePositions.push(pts[i].x, pts[i].y, pts[i].z, pts[j].x, pts[j].y, pts[j].z);
                    }
                }
            }
            const lineGeometry = new THREE.BufferGeometry();
            lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0xffaa00,
                transparent: true,
                opacity: 0.1,
                blending: THREE.AdditiveBlending
            });
            lines = new THREE.LineSegments(lineGeometry, lineMaterial);
            scene.add(lines);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
