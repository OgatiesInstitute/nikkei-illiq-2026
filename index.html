<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE IRON SKELETON // jewel // 08 APR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Times New Roman', serif; }
        #title {
            position: absolute; top: 40px; left: 40px; color: #FFFFFF;
            z-index: 10; pointer-events: none; letter-spacing: 0.3em; line-height: 1.8;
        }
    </style>
</head>
<body>
    <div id="title">
        <div style="font-size: 15px; font-style: italic; opacity: 0.9;">THE IRON SKELETON</div>
        <div style="font-size: 13px; opacity: 0.7;">NIKKEI 225 TOPOLOGY // jewel</div>
        <div style="font-size: 11px; opacity: 0.5;">08 // APRIL // 2026</div>
    </div>

    <script>
        let scene, camera, renderer, controls, points, lines;

        // 【極秘修正】中心部の白熱エリアを強烈に広げた高光沢テクスチャ
        function createIntenseRadiantTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255,255,255,1.0)');   // 核心：純白
            gradient.addColorStop(0.1, 'rgba(255,255,255,1.0)'); // 【昨日を超えさせるための白の拡大】
            gradient.addColorStop(0.3, 'rgba(255,255,255,0.7)'); // 強い光
            gradient.addColorStop(0.6, 'rgba(255,255,255,0.1)'); // 外縁
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 24);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.25;

            createStructure();
            animate();
        }

        function createStructure() {
            if (points) scene.remove(points);
            if (lines) scene.remove(lines);

            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const pts = [];
            const numPoints = 1400; // 昨日の密度に匹敵するボリューム

            const colorCrimson = new THREE.Color(0xff1100); // 昨日の赤
            const colorGold = new THREE.Color(0xffcc00);    // 昨日の金

            for (let i = 0; i < numPoints; i++) {
                const r = 8 + Math.random() * 4;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                
                const x = r * Math.sin(phi) * Math.cos(theta) * 1.5;
                const y = r * Math.cos(phi) * 0.7;
                const z = r * Math.sin(phi) * Math.sin(theta);

                positions.push(x, y, z);
                pts.push(new THREE.Vector3(x, y, z));

                const t = Math.pow(r / 12, 1.3);
                let c = new THREE.Color();
                c.copy(colorCrimson).lerp(colorGold, t);
                colors.push(c.r, c.g, c.b);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const pointMaterial = new THREE.PointsMaterial({
                size: 0.95,                    // サイズを拡大
                map: createIntenseRadiantTexture(),
                vertexColors: true,
                transparent: true,
                opacity: 1.0,                  // 昨日の熱量を取り戻すために不透明度MAX
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            points = new THREE.Points(geometry, pointMaterial);
            scene.add(points);

            // 金の糸（骨格）
            const linePositions = [];
            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dist = pts[i].distanceTo(pts[j]);
                    if (dist < 4.5 && Math.random() > 0.92) {
                        linePositions.push(pts[i].x, pts[i].y, pts[i].z, pts[j].x, pts[j].y, pts[j].z);
                    }
                }
            }
            const lineGeometry = new THREE.BufferGeometry();
            lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0xffaa00,
                transparent: true,
                opacity: 0.12,
                blending: THREE.AdditiveBlending
            });
            lines = new THREE.LineSegments(lineGeometry, lineMaterial);
            scene.add(lines);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
